name: Build QRQLL Mobile APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends python3 python3-pip openjdk-17-jdk-headless git
          pip3 install --break-system-packages buildozer cython setuptools
      
      - name: Build APK
        run: |
          qrqll_mobile
          yes | buildozer android debug
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: QRQLL-Mobile-APK
          path: qrqll_mobile/bin/*.apk
