name: Build QRQLL Mobile APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends python3 python3-pip python3-venv openjdk-17-jdk-headless git
          pip3 install buildozer cython setuptools
          echo "Dependencies installed"

      - name: Build APK
        run: |
          yes Y | buildozer android debug
        env:
          PIP_BREAK_SYSTEM_PACKAGES: 1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: QRQLL-Mobile-APK
          path: bin/*.apk
